services:
  # ─── API principale ───────────────────────────
  - name: deggbi-api
    type: web
    runtime: python
    region: frankfurt
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: REDIS_URL
        sync: false
      - key: WHATSAPP_TOKEN
        sync: false
      - key: WHATSAPP_PHONE_ID
        sync: false
      - key: WHATSAPP_VERIFY_TOKEN
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: HUGGINGFACE_API_KEY
        sync: false
      - key: GOOGLE_FACTCHECK_KEY
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: APP_ENV
        value: production

  # ─── Worker Celery (analyses IA async) ────────
  - name: deggbi-worker
    type: worker
    runtime: python
    region: frankfurt
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: celery -A app.tasks.analysis worker --loglevel=info --concurrency=2 -Q analysis
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: REDIS_URL
        sync: false
      - key: HUGGINGFACE_API_KEY
        sync: false
      - key: GOOGLE_FACTCHECK_KEY
        sync: false
      - key: APP_ENV
        value: production

  # ─── Dashboard Next.js (B2B) ──────────────────
  - name: deggbi-dashboard
    type: web
    buildCommand: cd frontend && npm ci && npm run build
    staticPublishPath: frontend/out
    envVars:
      - key: NEXT_PUBLIC_SUPABASE_URL
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_ANON_KEY
        sync: false
      - key: NEXT_PUBLIC_API_URL
        sync: false
